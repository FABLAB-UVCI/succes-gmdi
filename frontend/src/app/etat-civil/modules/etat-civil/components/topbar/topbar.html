<header class="topbar">
  <div class="topbar-brand">
    <div class="ci-flag">
      <span class="ci-orange"></span>
      <span class="ci-white"></span>
      <span class="ci-green"></span>
    </div>
    <div>
      <div class="topbar-title">GMDI — Module État Civil</div>
      <div class="topbar-sub">République de Côte d'Ivoire</div>
    </div>
  </div>
  <div class="topbar-user">
    <div class="av">{{ userInitials() }}</div>
    <span><strong>{{ userName() }}</strong> — {{ userRole() }}</span>
    <button class="logout-btn" (click)="logout()" title="Retour aux modules">
      <i class="ti ti-layout-grid"></i>
      <span class="logout-label">Modules</span>
    </button>
  </div>
</header>

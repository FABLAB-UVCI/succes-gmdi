<div class="kpi-row">
  @for (kpi of getKpis(); track kpi.label) {
    <div class="kpi">
      <div class="kpi-bar" [style.background]="kpi.barColor"></div>
      <div class="kpi-ic-box" [style.background]="kpi.iconBg" [style.color]="kpi.color">
        <i [class]="kpi.icon"></i>
      </div>
      <div>
        <div class="kpi-v">{{ kpi.value }}</div>
        <div class="kpi-l">{{ kpi.label }}</div>
      </div>
    </div>
  }
</div>

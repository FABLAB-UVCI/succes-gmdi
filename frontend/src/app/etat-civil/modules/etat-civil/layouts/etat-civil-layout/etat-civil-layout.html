<div class="layout-container">

  <!-- Overlay mobile -->
  @if (sidebarOpen()) {
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <div class="sidebar-wrapper" [class.open]="sidebarOpen()">
    <app-sidebar (click)="closeSidebar()"></app-sidebar>
  </div>

  <div class="content-wrapper">

    <!-- Topbar avec hamburger -->
    <div class="topbar-row">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <app-topbar></app-topbar>
    </div>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

  </div>

  <!-- Bouton QR flottant -->
  <button class="qr-fab" (click)="openQr()" title="Vérifier un QR Code">
    <i class="ti ti-qrcode"></i>
  </button>

  <!-- Modal QR -->
  @if (qrOpen()) {
    <div class="modal-backdrop" (click)="closeQr()">
      <div class="modal-box" (click)="$event.stopPropagation()">
        <div class="modal-header">
          <span><i class="ti ti-qrcode"></i> Vérification QR Code</span>
          <button class="modal-close" (click)="closeQr()"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
          <p style="color:#6c757d;font-size:13px;margin-bottom:1rem">Saisir ou scanner le code QR de l'acte à vérifier</p>
          <input class="qr-input" [(ngModel)]="qrValue" type="text" placeholder="Ex: QR-CI-CC-2025-N-001284" (keyup.enter)="verifierQR()">
          <button class="btn-p" style="width:100%;margin-top:.8rem" (click)="verifierQR()">
            <i class="ti ti-search"></i> Vérifier
          </button>
          @if (qrResult()) {
            <div class="qr-result">{{ qrResult() }}</div>
          }
        </div>
      </div>
    </div>
  }

</div>

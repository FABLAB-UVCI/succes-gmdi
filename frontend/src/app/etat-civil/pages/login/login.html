<div class="login-root">

  <!-- Bandeau couleurs CI en haut -->
  <div class="ci-bar">
    <div class="ci-orange"></div>
    <div class="ci-white"></div>
    <div class="ci-green"></div>
  </div>

  <div class="login-wrap">

    <!-- Logo / En-tête -->
    <div class="login-header">
      <div class="logo-circle">
        <i class="ti ti-building-community"></i>
      </div>
      <div class="login-title">GMDI</div>
      <div class="login-subtitle">Gestion de l'État Civil</div>
      <div class="login-nation">République de Côte d'Ivoire</div>
    </div>

    <!-- Formulaire -->
    <div class="login-card">
      <div class="card-title">Connexion</div>
      <div class="card-desc">Accès réservé aux agents autorisés</div>

      @if (error()) {
        <div class="error-box">
          <i class="ti ti-alert-circle"></i>
          {{ error() }}
        </div>
      }

      <div class="field">
        <label class="field-label">Adresse e-mail</label>
        <div class="field-wrap">
          <i class="ti ti-mail field-icon"></i>
          <input
            class="field-input"
            type="email"
            [(ngModel)]="email"
            placeholder="agent@gmdi.ci"
            (keyup.enter)="login()"
            autocomplete="email"
          />
        </div>
      </div>

      <div class="field">
        <label class="field-label">Mot de passe</label>
        <div class="field-wrap">
          <i class="ti ti-lock field-icon"></i>
          <input
            class="field-input"
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="••••••••"
            (keyup.enter)="login()"
            autocomplete="current-password"
          />
          <button class="eye-btn" type="button" (click)="togglePassword()">
            <i [class]="showPassword() ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
          </button>
        </div>
      </div>

      <button class="login-btn" (click)="login()" [disabled]="loading()">
        @if (loading()) {
          <i class="ti ti-loader-2 spin"></i> Connexion en cours...
        } @else {
          <i class="ti ti-login"></i> Se connecter
        }
      </button>

      <div class="hint">
        <i class="ti ti-info-circle"></i>
        Comptes de démonstration :<br>
        <code>admin&#64;gmdi.ci</code> / <code>Admin&#64;2025</code><br>
        <code>agent&#64;gmdi.ci</code> / <code>Agent&#64;2025</code>
      </div>
    </div>

    <div class="login-footer">
      © {{ currentYear }} Ministère de l'Intérieur — Côte d'Ivoire
    </div>
  </div>

</div>
